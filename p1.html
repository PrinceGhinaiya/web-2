<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Page</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">

    <h2>Login to Your Account</h2>

    <form>
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" required style="margin-bottom: 10px; padding: 5px;"><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required style="margin-bottom: 20px; padding: 5px;"><br>

        <button type="button" style="padding: 10px 20px; cursor: pointer;">Login</button>
    </form>

</body>
</html>
